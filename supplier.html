<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>Fireside – Stock Update</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f5f5;color:#111;min-height:100vh;-webkit-font-smoothing:antialiased}
.header{background:#111;color:#fff;padding:18px 20px}
.header h1{font-size:17px;font-weight:700;letter-spacing:.5px}
.header-sub{font-size:12px;color:#888;margin-left:6px}
.main{padding:20px;max-width:480px;margin:0 auto}
.card{background:#fff;border-radius:10px;padding:18px;margin-bottom:14px;box-shadow:0 1px 3px rgba(0,0,0,.08)}
.supplier-name{font-size:24px;font-weight:800;margin-bottom:4px}
.supplier-sub{font-size:13px;color:#888}
.section-label{font-size:10px;font-weight:700;color:#999;text-transform:uppercase;letter-spacing:.8px;margin-bottom:12px}
.wood-row{display:grid;grid-template-columns:1fr auto auto;align-items:center;gap:10px;padding:12px 0;border-bottom:1px solid #f0f0f0}
.wood-row:last-child{border-bottom:none}
.wood-name{font-size:15px;font-weight:600;margin-bottom:4px}
.price-wrap{display:flex;align-items:center;gap:4px;font-size:13px;color:#666}
.price-wrap span{font-size:12px;color:#999}
.price-input{width:70px;padding:5px 6px;font-size:13px;font-weight:600;border:1.5px solid #e0e0e0;border-radius:6px;text-align:center;outline:none;color:#111}
.price-input:focus{border-color:#111}
.cube-wrap{text-align:center}
.cube-input{width:80px;padding:8px 8px;font-size:18px;font-weight:700;border:2px solid #e0e0e0;border-radius:8px;text-align:center;outline:none;-webkit-appearance:none}
.cube-input:focus{border-color:#111}
.unit{font-size:11px;color:#999;text-align:center;margin-top:3px}
.add-row{display:grid;grid-template-columns:1fr 80px 80px;gap:8px;margin-top:14px;padding-top:14px;border-top:1px solid #f0f0f0;align-items:end}
.add-row label{font-size:11px;color:#999;display:block;margin-bottom:4px;font-weight:600;text-transform:uppercase;letter-spacing:.5px}
.add-input{width:100%;padding:8px 10px;font-size:14px;border:1.5px solid #e0e0e0;border-radius:7px;outline:none}
.add-input:focus{border-color:#111}
.add-btn{padding:8px;background:#111;color:#fff;border:none;border-radius:7px;font-size:13px;font-weight:700;cursor:pointer;white-space:nowrap}
.btn{display:block;width:100%;padding:15px;background:#111;color:#fff;border:none;border-radius:8px;font-size:16px;font-weight:700;cursor:pointer;transition:opacity .15s}
.btn:active{opacity:.8}
.btn:disabled{background:#ccc;cursor:not-allowed}
.success{display:none;background:#ecfdf5;border:1px solid #bbf7d0;border-radius:10px;padding:20px;text-align:center;margin-top:14px}
.success-icon{font-size:36px;margin-bottom:8px}
.success-title{font-size:18px;font-weight:700;color:#166534;margin-bottom:4px}
.success-sub{font-size:13px;color:#4d7c5f}
.loading{text-align:center;padding:60px 20px;color:#999;font-size:15px}
.error-box{background:#fef2f2;border:1px solid #fecaca;border-radius:10px;padding:20px;text-align:center;color:#991b1b;font-size:14px;margin-top:14px}
</style>
</head>
<body>
<div class="header">
  <h1>FIRESIDE <span class="header-sub">Stock Update</span></h1>
</div>
<div class="main">
  <div id="loading" class="loading">Loading your stock sheet…</div>
  <div id="content" style="display:none">
    <div class="card">
      <div class="supplier-name" id="sup-name"></div>
      <div class="supplier-sub">Update your stock and prices below</div>
    </div>
    <div class="card">
      <div class="section-label">Wood Types &amp; Stock</div>
      <div id="wood-list"></div>
      <!-- Add new wood type -->
      <div style="margin-top:14px;padding-top:14px;border-top:1px solid #f0f0f0">
        <div style="font-size:11px;color:#999;font-weight:700;text-transform:uppercase;letter-spacing:.5px;margin-bottom:10px">Add Wood Type</div>
        <div style="display:grid;grid-template-columns:1fr auto;gap:8px;margin-bottom:8px">
          <div>
            <label style="font-size:11px;color:#999;display:block;margin-bottom:4px;font-weight:600;text-transform:uppercase;letter-spacing:.5px">Type</label>
            <select class="add-input" id="new-wood-name" style="width:100%;padding:8px 10px;font-size:14px;border:1.5px solid #e0e0e0;border-radius:7px;outline:none;background:#fff">
              <option value="">Select…</option>
              <option>Pine</option><option>Gum</option><option>Macro</option><option>Poplar</option>
              <option>Black Poplar</option><option>Mixed</option><option>Hot Mix</option><option>OMP</option>
              <option value="__other__">Other…</option>
            </select>
            <input id="new-wood-custom" placeholder="Wood type name" style="display:none;margin-top:6px;width:100%;padding:8px 10px;font-size:14px;border:1.5px solid #e0e0e0;border-radius:7px;outline:none">
          </div>
          <div>
            <label style="font-size:11px;color:#999;display:block;margin-bottom:4px;font-weight:600;text-transform:uppercase;letter-spacing:.5px">Seasoned</label>
            <div style="display:flex;gap:6px;padding-top:4px">
              <label style="display:flex;align-items:center;gap:4px;cursor:pointer">
                <input type="radio" name="new-seasoned" value="dry" checked>
                <span style="background:#b45309;color:#fff;border-radius:4px;padding:3px 10px;font-size:12px;font-weight:700">DRY</span>
              </label>
              <label style="display:flex;align-items:center;gap:4px;cursor:pointer">
                <input type="radio" name="new-seasoned" value="green">
                <span style="background:#16a34a;color:#fff;border-radius:4px;padding:3px 10px;font-size:12px;font-weight:700">GREEN</span>
              </label>
            </div>
          </div>
        </div>
        <div style="display:grid;grid-template-columns:1fr 1fr auto;gap:8px;align-items:end">
          <div>
            <label style="font-size:11px;color:#999;display:block;margin-bottom:4px;font-weight:600;text-transform:uppercase;letter-spacing:.5px">$/m³</label>
            <input id="new-wood-price" type="number" placeholder="135" min="0" style="width:100%;padding:8px 10px;font-size:14px;border:1.5px solid #e0e0e0;border-radius:7px;outline:none">
          </div>
          <div>
            <label style="font-size:11px;color:#999;display:block;margin-bottom:4px;font-weight:600;text-transform:uppercase;letter-spacing:.5px">m³ available</label>
            <input id="new-wood-cubes" type="number" placeholder="0" min="0" step="0.5" style="width:100%;padding:8px 10px;font-size:14px;border:1.5px solid #e0e0e0;border-radius:7px;outline:none">
          </div>
          <button class="add-btn" onclick="addWoodType()">+ Add</button>
        </div>
      </div>
    </div>
    <button class="btn" id="submit-btn" onclick="submitUpdate()">Save Stock Update</button>
    <div class="success" id="success-box">
      <div class="success-icon">✓</div>
      <div class="success-title">Stock Updated</div>
      <div class="success-sub">Delta has been notified. Thanks!</div>
    </div>
  </div>
  <div id="error-box" class="error-box" style="display:none"></div>
</div>

<script type="module">
const FIREBASE_CONFIG = {
  apiKey: "AIzaSyCalixZyriXCwC2Ce0GcCFvpG2G3KOtfbE",
  authDomain: "fireside-app-7fe0d.firebaseapp.com",
  projectId: "fireside-app-7fe0d",
  storageBucket: "fireside-app-7fe0d.appspot.com",
  appId: "1:1022775224950:web:78ebb0c30501d928a68d57"
};

import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getFirestore, doc, getDoc, updateDoc } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

const params = new URLSearchParams(location.search);
const supplierId = params.get('id');
let _db, _s, _allSuppliers;

if(!supplierId){
  showError('No supplier ID in URL. Please use the link sent to you by Fireside.');
} else {
  const app = initializeApp(FIREBASE_CONFIG);
  _db = getFirestore(app);
  loadSupplier(_db, supplierId);
}

async function loadSupplier(db, id){
  try{
    const snap = await getDoc(doc(db,'fireside','data'));
    if(!snap.exists()) return showError('Could not load data. Please try again.');
    _allSuppliers = snap.data().suppliers || [];
    _s = _allSuppliers.find(x => x.id === id);
    if(!_s) return showError('Supplier not found. Check the link is correct.');
    renderForm();
  }catch(e){
    showError('Connection error: '+e.message);
  }
}

function renderForm(){
  document.getElementById('loading').style.display='none';
  document.getElementById('content').style.display='block';
  document.getElementById('sup-name').textContent = _s.name;
  renderWoodList();
}

function renderWoodList(){
  const rows = (_s.woodTypes||[]).filter(w=>w.avail);
  document.getElementById('wood-list').innerHTML = rows.map((w,i)=>`
    <div class="wood-row">
      <div style="flex:1">
        <div class="wood-name">${w.type}</div>
        <div class="price-wrap">
          $<input class="price-input" type="number" id="p-${i}"
                 value="${w.cost||0}" min="0" step="1" title="Price per m³">
          <span>/m³</span>
        </div>
        <div style="display:flex;gap:8px;margin-top:8px">
          <label style="display:flex;align-items:center;gap:5px;cursor:pointer">
            <input type="radio" name="s-${i}" value="dry" ${(w.seasoned||'dry')==='dry'?'checked':''}>
            <span style="background:#b45309;color:#fff;border-radius:4px;padding:2px 8px;font-size:12px;font-weight:700">DRY</span>
          </label>
          <label style="display:flex;align-items:center;gap:5px;cursor:pointer">
            <input type="radio" name="s-${i}" value="green" ${w.seasoned==='green'?'checked':''}>
            <span style="background:#16a34a;color:#fff;border-radius:4px;padding:2px 8px;font-size:12px;font-weight:700">GREEN</span>
          </label>
        </div>
      </div>
      <div class="cube-wrap">
        <input class="cube-input" type="number" id="c-${i}"
               value="${w.cubes||0}" min="0" step="0.5">
        <div class="unit">m³</div>
      </div>
      <button onclick="removeWoodType(${i})" style="background:none;border:none;color:#ccc;font-size:20px;cursor:pointer;padding:0 0 0 8px;line-height:1" title="Remove">×</button>
    </div>`).join('');
}

window.removeWoodType = function(i){
  const rows = (_s.woodTypes||[]).filter(w=>w.avail);
  const target = rows[i];
  if(!target) return;
  target.avail = false;
  renderWoodList();
};

function key(t){ return t.replace(/\s/g,'-'); }

// Show/hide custom input when "Other…" selected
document.addEventListener('change', function(e){
  if(e.target.id==='new-wood-name'){
    document.getElementById('new-wood-custom').style.display = e.target.value==='__other__' ? 'block' : 'none';
  }
});

window.addWoodType = function(){
  const sel = document.getElementById('new-wood-name').value;
  const custom = document.getElementById('new-wood-custom').value.trim();
  const name = sel==='__other__' ? custom : sel;
  const seasoned = document.querySelector('input[name="new-seasoned"]:checked')?.value||'dry';
  const price = parseFloat(document.getElementById('new-wood-price').value)||0;
  const cubes = parseFloat(document.getElementById('new-wood-cubes').value)||0;
  if(!name){ alert('Select a wood type'); return; }
  const existing=_s.woodTypes.find(w=>w.type.toLowerCase()===name.toLowerCase()&&(w.seasoned||'dry')===seasoned);
  if(existing){
    existing.cost=price; existing.cubes=cubes; existing.avail=true;
  } else {
    _s.woodTypes.push({type:name, seasoned:seasoned, cost:price, avail:true, cubes:cubes});
  }
  document.getElementById('new-wood-name').value='';
  document.getElementById('new-wood-custom').value='';
  document.getElementById('new-wood-custom').style.display='none';
  document.getElementById('new-wood-price').value='';
  document.getElementById('new-wood-cubes').value='';
  renderWoodList();
};

window._submitFn = async function(){
  const btn = document.getElementById('submit-btn');
  btn.disabled=true; btn.textContent='Saving…';
  try{
    // Read back all editable values
    (_s.woodTypes||[]).filter(w=>w.avail).forEach((w,i)=>{
      const ci = document.getElementById('c-'+i);
      const pi = document.getElementById('p-'+i);
      const si = document.querySelector(`input[name="s-${i}"]:checked`);
      if(ci) w.cubes = parseFloat(ci.value)||0;
      if(pi) w.cost  = parseFloat(pi.value)||0;
      if(si) w.seasoned = si.value;
    });
    _s.lastUpdated = new Date().toISOString();
    const updated = _allSuppliers.map(x => x.id===_s.id ? _s : x);
    await updateDoc(doc(_db,'fireside','data'),{ suppliers: updated });
    document.getElementById('submit-btn').style.display='none';
    document.getElementById('success-box').style.display='block';
  }catch(e){
    btn.disabled=false; btn.textContent='Save Stock Update';
    showError('Save failed: '+e.message);
  }
};

function showError(msg){
  document.getElementById('loading').style.display='none';
  const box=document.getElementById('error-box');
  box.textContent=msg; box.style.display='block';
}
</script>
<script>
function submitUpdate(){ if(window._submitFn) window._submitFn(); }
</script>
</body>
</html>
